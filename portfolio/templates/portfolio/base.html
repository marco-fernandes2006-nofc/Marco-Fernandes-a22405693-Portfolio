<!-- templates/escola/base.html -->

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    
    <!-- link para ficheiro styles.css com regras de estilização -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'portfolio/styles.css' %}">
</head>
<body>
    <header>
        <h1>Portfolio</h1>
        <nav>
            <a href="{% url 'landing_page' %}">Sobre</a>
            <a href="{% url 'licenciaturas' %}">Licenciaturas</a>
            <a href="{% url 'projetos' %}">Projetos</a>
            <a href="{% url 'tfcs' %}">TFCs</a>
            <a href="{% url 'competencias' %}">Competências</a>
            <a href="{% url 'formacoes' %}">Formações</a>
            <a href="{% url 'makingofs' %}">MakingOFs</a>
            <a href="{% url 'contribuicoes' %}">Contribuições Open-Source</a>
            <a href="{% url 'tecnologias' %}">Tecnologias</a>
            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </nav>
    </header>


    <main>
        {% block content %}
        <!-- Conteúdo dinâmico -->
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026</p>
    </footer>

</body>
</html>
