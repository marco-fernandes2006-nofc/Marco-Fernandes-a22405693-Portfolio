{% extends 'portfolio/base.html' %}

{% block content %}
<article>
    <h2>Editar Formação</h2>
    <p><strong>Formação atual:</strong> {{ formacao.titulo }}</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
    </form>
</article>
{% endblock %}
